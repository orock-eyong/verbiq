AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Verbiq - AI Text Analysis Pipeline
  Single Lambda, single bucket, cost-optimised with TTL.
  No SQS, no Step Functions, no CloudWatch alarms.

Parameters:
  Environment:
    Type: String
    Default: prod
    Description: Environment name

  BucketName:
    Type: String
    Default: verbiq-bucket
    Description: Base name for the S3 bucket

  DynamoDBTableName:
    Type: String
    Default: VerbiqMetadata
    Description: Base name for the DynamoDB table

  NotificationEmail:
    Type: String
    Description: Email address for notifications

  DocumentParserLayerArn:
    Type: String
    Description: ARN of the Lambda Layer containing pypdf

Resources:

  # ─────────────────────────────────────────
  # S3 Bucket - single bucket with TTL
  # ─────────────────────────────────────────
  VerbiqBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${Environment}-${AWS::Region}-${BucketName}
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - PUT
              - GET
            AllowedOrigins:
              - '*'
            MaxAge: 3000
      LifecycleConfiguration:
        Rules:
          - Id: DeleteUploadsAfter1Day
            Status: Enabled
            Prefix: uploads/
            ExpirationInDays: 1
          - Id: DeleteResultsAfter7Days
            Status: Enabled
            Prefix: results/
            ExpirationInDays: 7
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ─────────────────────────────────────────
  # SNS Topic - single topic for all alerts
  # ─────────────────────────────────────────
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${Environment}-${AWS::Region}-VerbiqNotifications
      Subscription:
        - Protocol: email
          Endpoint: !Ref NotificationEmail

  # ─────────────────────────────────────────
  # DynamoDB Table - with TTL enabled
  # ─────────────────────────────────────────
  MetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${Environment}-${AWS::Region}-${DynamoDBTableName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: fileName
          AttributeType: S
      KeySchema:
        - AttributeName: fileName
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ─────────────────────────────────────────
  # IAM Role - single Lambda role
  # ─────────────────────────────────────────
  VerbiqLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${Environment}-${AWS::Region}-VerbiqLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: VerbiqLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub arn:aws:s3:::${Environment}-${AWS::Region}-${BucketName}/*
              - Effect: Allow
                Action: dynamodb:PutItem
                Resource: !GetAtt MetadataTable.Arn
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref NotificationTopic

  # ─────────────────────────────────────────
  # Single Lambda - does everything
  # ─────────────────────────────────────────
  VerbiqFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${Environment}-${AWS::Region}-VerbiqProcessor
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt VerbiqLambdaRole.Arn
      Timeout: 300
      MemorySize: 1024
      Layers:
        - !Ref DocumentParserLayerArn
      Environment:
        Variables:
          BUCKET_NAME:       !Sub ${Environment}-${AWS::Region}-${BucketName}
          SNS_TOPIC_ARN:     !Ref NotificationTopic
          DDB_TABLE_NAME:    !Sub ${Environment}-${AWS::Region}-${DynamoDBTableName}
          DDB_PARTITION_KEY: fileName
          AWS_REGION_NAME:   !Ref AWS::Region
          ALLOWED_EXTENSIONS: .txt,.pdf,.docx
          CORS_ALLOW_ORIGIN: '*'
          UPLOADS_TTL_DAYS:  '1'
          RESULTS_TTL_DAYS:  '7'
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          import re
          import math
          import unicodedata
          import zipfile
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone, timedelta
          from collections import Counter
          from botocore.exceptions import ClientError

          # ── Optional libraries from Layer ──
          try:
              import pypdf
              PYPDF_AVAILABLE = True
          except ImportError as e:
              PYPDF_AVAILABLE = False
              print(f"WARNING: pypdf not available - {str(e)}")

          try:
              from pdfminer.high_level import extract_text as pdfminer_extract
              PDFMINER_AVAILABLE = True
          except ImportError as e:
              PDFMINER_AVAILABLE = False
              print(f"WARNING: pdfminer not available - {str(e)}")

          REGION             = os.environ.get('AWS_REGION_NAME', 'eu-west-3')
          BUCKET_NAME        = os.environ.get('BUCKET_NAME')
          SNS_TOPIC_ARN      = os.environ.get('SNS_TOPIC_ARN')
          DDB_TABLE_NAME     = os.environ.get('DDB_TABLE_NAME')
          DDB_PARTITION_KEY  = os.environ.get('DDB_PARTITION_KEY', 'fileName')
          ALLOWED_EXTENSIONS = os.environ.get('ALLOWED_EXTENSIONS', '.txt,.pdf,.docx').split(',')
          ALLOWED_ORIGINS    = os.environ.get('CORS_ALLOW_ORIGIN', '*').split(',')
          RESULTS_TTL_DAYS   = int(os.environ.get('RESULTS_TTL_DAYS', '7'))

          s3       = boto3.client('s3', region_name=REGION, endpoint_url=f'https://s3.{REGION}.amazonaws.com')
          sns      = boto3.client('sns', region_name=REGION)
          dynamodb = boto3.resource('dynamodb', region_name=REGION)

          STOP_WORDS = set([
              'a','an','the','and','or','but','in','on','at','to','for','of','with',
              'by','from','is','was','are','were','be','been','being','have','has',
              'had','do','does','did','will','would','could','should','may','might',
              'this','that','these','those','i','you','he','she','it','we','they',
              'me','him','her','us','them','my','your','his','its','our','their',
              'what','which','who','when','where','how','all','each','every','both',
              'not','no','so','if','as','up','out','about','into','than','then',
              'just','also','more','some','can','its','s','t','re','ve','ll','d',
              'was','been','being','do','did','does','done','get','got','make',
              'made','said','say','go','going','gone','come','came','take','took',
              'one','two','three','four','five','six','seven','eight','nine','ten',
              'like','well','back','even','still','way','want','look','first','know'
          ])

          # ─────────────────────────────────────────
          # CORS Headers
          # ─────────────────────────────────────────
          def get_cors_headers(event):
              origin = event.get('headers', {}).get('origin') or event.get('headers', {}).get('Origin', '')
              allowed_origin = origin if origin in ALLOWED_ORIGINS else ALLOWED_ORIGINS[0]
              return {
                  'Access-Control-Allow-Origin': allowed_origin,
                  'Access-Control-Allow-Headers': 'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token',
                  'Access-Control-Allow-Methods': 'POST,OPTIONS',
                  'Vary': 'Origin'
              }

          # ─────────────────────────────────────────
          # Text Cleaning
          # ─────────────────────────────────────────
          def clean_text(text):
              if not text:
                  return ''
              text = re.sub(r'PK\x03\x04.*', '', text, flags=re.DOTALL)
              text = re.sub(r'PK\x01\x02.*', '', text, flags=re.DOTALL)
              text = re.sub(r'<[^>]+>', ' ', text)
              pdf_patterns = [
                  r'endstream\s*endobj', r'<<\s*/Type\s*/\w+',
                  r'/Filter\s*/FlateDecode', r'/Length\s*\d+',
                  r'/FontDescriptor', r'/BaseFont', r'obj\s*<<',
                  r'>>\s*endobj', r'xref\b', r'trailer\b',
                  r'startxref\b', r'%%EOF', r'/StructElem',
              ]
              for pattern in pdf_patterns:
                  text = re.sub(pattern, ' ', text, flags=re.IGNORECASE | re.DOTALL)
              text = re.sub(r'[\x00-\x08\x0b\x0c\x0e-\x1f\x7f-\x9f]', ' ', text)
              lines = text.split('\n')
              clean_lines = []
              for line in lines:
                  line = line.strip()
                  if not line:
                      continue
                  ascii_chars = sum(1 for c in line if ord(c) < 128 and c.isprintable())
                  total_chars = len(line)
                  if total_chars > 0 and ascii_chars / total_chars < 0.5:
                      continue
                  if re.match(r'^[A-Za-z0-9+/=]{50,}$', line):
                      continue
                  if line.count('\\') > 8:
                      continue
                  if len(line) < 3 and not line[0].isalnum():
                      continue
                  clean_lines.append(line)
              text = '\n'.join(clean_lines)
              text = unicodedata.normalize('NFKD', text)
              text = re.sub(r' {2,}', ' ', text)
              text = re.sub(r'\n{3,}', '\n\n', text)
              return text.strip()

          # ─────────────────────────────────────────
          # Document Parsers
          # ─────────────────────────────────────────
          def extract_text_from_docx(file_path):
              """Built-in DOCX extraction. Zero dependencies."""
              text = ''
              try:
                  with zipfile.ZipFile(file_path, 'r') as z:
                      if 'word/document.xml' not in z.namelist():
                          print("No word/document.xml found in DOCX")
                          return ''
                      with z.open('word/document.xml') as f:
                          tree = ET.parse(f)
                          root = tree.getroot()
                          ns = '{http://schemas.openxmlformats.org/wordprocessingml/2006/main}'
                          for para in root.iter(f'{ns}p'):
                              para_text = ''
                              for run in para.iter(f'{ns}t'):
                                  if run.text:
                                      para_text += run.text
                              if para_text.strip():
                                  text += para_text + '\n'
                  print(f"Built-in DOCX extractor got {len(text)} chars")
                  return clean_text(text)
              except Exception as e:
                  print(f"DOCX extraction failed: {str(e)}")
                  return ''

          def extract_text_from_pdf(file_path):
              """PDF extraction via pypdf then pdfminer fallback."""
              text = ''
              if PYPDF_AVAILABLE:
                  try:
                      with open(file_path, 'rb') as f:
                          reader = pypdf.PdfReader(f)
                          for page in reader.pages:
                              page_text = page.extract_text()
                              if page_text:
                                  text += page_text + '\n'
                      cleaned = clean_text(text)
                      if len(cleaned) > 100:
                          print(f"pypdf extracted {len(cleaned)} chars")
                          return cleaned
                  except Exception as e:
                      print(f"pypdf failed: {str(e)}")
              if PDFMINER_AVAILABLE:
                  try:
                      text = pdfminer_extract(file_path)
                      cleaned = clean_text(text)
                      if len(cleaned) > 100:
                          print(f"pdfminer extracted {len(cleaned)} chars")
                          return cleaned
                  except Exception as e:
                      print(f"pdfminer failed: {str(e)}")
              print("WARNING: All PDF extraction methods failed")
              return ''

          def extract_text_from_txt(file_path):
              try:
                  with open(file_path, 'r', encoding='utf-8', errors='ignore') as f:
                      return clean_text(f.read())
              except Exception as e:
                  print(f"TXT extraction failed: {str(e)}")
                  return ''

          def extract_text(file_path, filename):
              ext = filename.lower().split('.')[-1]
              print(f"Extracting text from {filename} (type: {ext})")
              if ext == 'pdf':
                  return extract_text_from_pdf(file_path)
              elif ext == 'docx':
                  return extract_text_from_docx(file_path)
              elif ext in ['txt', 'csv']:
                  return extract_text_from_txt(file_path)
              else:
                  print(f"Unsupported file type: {ext}")
                  return ''

          # ─────────────────────────────────────────
          # Language Detection
          # ─────────────────────────────────────────
          def detect_language(text):
              sample       = text.lower()[:3000]
              lang_markers = {
                  'English':    ['the','and','is','in','to','of','a','that','it','with'],
                  'French':     ['le','la','les','et','est','en','un','une','des','que'],
                  'Spanish':    ['el','la','los','las','es','en','un','una','que','de'],
                  'German':     ['der','die','das','und','ist','in','ein','eine','mit','ich'],
                  'Portuguese': ['o','a','os','as','e','em','um','uma','que','de'],
              }
              words  = re.findall(r'\b\w+\b', sample)
              freq   = Counter(words)
              scores = {lang: sum(freq.get(m, 0) for m in markers) for lang, markers in lang_markers.items()}
              return max(scores, key=scores.get)

          # ─────────────────────────────────────────
          # TextRank Summary
          # ─────────────────────────────────────────
          def textrank_summary(text, num_sentences=4):
              sentences = re.split(r'(?<=[.!?])\s+', text.strip())
              sentences = [s.strip() for s in sentences if len(s.strip()) > 30]
              if not sentences:
                  return ''
              if len(sentences) <= num_sentences:
                  return ' '.join(sentences)

              def get_words(s):
                  return set(re.findall(r'\b[a-zA-Z]{3,}\b', s.lower())) - STOP_WORDS

              n          = len(sentences)
              similarity = [[0.0] * n for _ in range(n)]
              for i in range(n):
                  for j in range(n):
                      if i == j: continue
                      words_i = get_words(sentences[i])
                      words_j = get_words(sentences[j])
                      if not words_i or not words_j: continue
                      intersection = len(words_i & words_j)
                      denominator  = math.log(len(words_i) + 1) + math.log(len(words_j) + 1)
                      if denominator > 0:
                          similarity[i][j] = intersection / denominator

              scores  = [1.0] * n
              damping = 0.85
              for _ in range(20):
                  new_scores = []
                  for i in range(n):
                      rank = (1 - damping)
                      for j in range(n):
                          if i == j: continue
                          col_sum = sum(similarity[k][j] for k in range(n))
                          if col_sum > 0:
                              rank += damping * (similarity[j][i] / col_sum) * scores[j]
                      new_scores.append(rank)
                  scores = new_scores

              ranked      = sorted(range(n), key=lambda i: scores[i], reverse=True)
              top_indices = sorted(ranked[:num_sentences])
              return ' '.join(sentences[i] for i in top_indices)[:800]

          # ─────────────────────────────────────────
          # TF-IDF Keyword Extraction
          # ─────────────────────────────────────────
          def extract_keywords_tfidf(text, top_n=12):
              sentences = [s for s in re.split(r'(?<=[.!?])\s+', text.strip()) if len(s) > 10]
              all_words = re.findall(r'\b[a-zA-Z]{3,20}\b', text.lower())
              filtered  = [w for w in all_words if w not in STOP_WORDS]
              if not filtered:
                  return []
              tf    = Counter(filtered)
              total = len(filtered)
              results = []
              for word, count in tf.most_common(top_n * 3):
                  if count < 2: continue
                  if re.match(r'^(xml|obj|ref|pdf|font|type|subtype|length|filter|stream|endobj|endstream|docx|docprops)$', word): continue
                  doc_freq = sum(1 for s in sentences if word in s.lower())
                  if doc_freq == 0: continue
                  tfidf = (count / total) * math.log((len(sentences) + 1) / (doc_freq + 1))
                  results.append({'word': word, 'count': count, 'score': round(tfidf, 4)})
              results.sort(key=lambda x: x['score'], reverse=True)
              return results[:top_n]

          # ─────────────────────────────────────────
          # Readability
          # ─────────────────────────────────────────
          def count_syllables(word):
              word = word.lower().strip(".:;?!")
              if len(word) <= 3: return 1
              return max(1, len(re.findall(r'[aeiouy]+', word)))

          def calculate_readability(word_count, sent_count, syllables):
              if sent_count == 0 or word_count == 0: return 0
              score = 206.835 - 1.015 * (word_count / sent_count) - 84.6 * (syllables / word_count)
              return round(max(0, min(100, score)), 1)

          def get_readability_label(score):
              if score >= 90: return 'Very Easy'
              if score >= 70: return 'Easy'
              if score >= 60: return 'Standard'
              if score >= 50: return 'Fairly Difficult'
              if score >= 30: return 'Difficult'
              return 'Very Difficult'

          # ─────────────────────────────────────────
          # CV Parser
          # ─────────────────────────────────────────
          def parse_cv(text):
              cv_data = {
                  'is_cv': False, 'name': None, 'email': None,
                  'phone': None, 'linkedin': None, 'github': None,
                  'skills': [], 'experience': [], 'education': []
              }
              cv_keywords = ['experience','education','skills','resume','curriculum',
                             'employment','qualification','objective','profile','references']
              text_lower = text.lower()
              if sum(1 for kw in cv_keywords if kw in text_lower) < 2:
                  return cv_data
              cv_data['is_cv'] = True
              lines = [l.strip() for l in text.split('\n') if l.strip()]
              email_match = re.search(r'\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b', text)
              if email_match: cv_data['email'] = email_match.group()
              phone_match = re.search(r'(\+?\d[\d\s\-().]{7,}\d)', text)
              if phone_match: cv_data['phone'] = phone_match.group().strip()
              linkedin_match = re.search(r'linkedin\.com/in/[\w\-]+', text, re.IGNORECASE)
              if linkedin_match: cv_data['linkedin'] = linkedin_match.group()
              github_match = re.search(r'github\.com/[\w\-]+', text, re.IGNORECASE)
              if github_match: cv_data['github'] = github_match.group()
              for line in lines[:5]:
                  if (not re.search(r'[@\d]', line) and
                          len(line.split()) <= 5 and len(line) > 3 and line[0].isupper()):
                      cv_data['name'] = line
                      break
              skill_keywords = [
                  'python','javascript','java','typescript','react','node','aws','azure','gcp',
                  'docker','kubernetes','sql','mongodb','postgresql','git','linux','html','css',
                  'machine learning','deep learning','tensorflow','pytorch','spark','hadoop',
                  'excel','powerpoint','word','tableau','power bi','r','scala','go','rust',
                  'project management','agile','scrum','communication','leadership','teamwork',
                  'c++','c#','.net','spring','django','flask','fastapi','graphql','rest','api'
              ]
              cv_data['skills'] = list(dict.fromkeys([s for s in skill_keywords if s in text_lower]))[:20]
              exp_section = re.search(
                  r'(?:experience|employment|work history)[:\s]*\n(.*?)(?:education|skills|references|\Z)',
                  text, re.IGNORECASE | re.DOTALL)
              if exp_section:
                  cv_data['experience'] = [l.strip() for l in exp_section.group(1).split('\n') if l.strip()][:6]
              edu_section = re.search(
                  r'(?:education|academic|qualification)[:\s]*\n(.*?)(?:experience|skills|references|\Z)',
                  text, re.IGNORECASE | re.DOTALL)
              if edu_section:
                  cv_data['education'] = [l.strip() for l in edu_section.group(1).split('\n') if l.strip()][:4]
              return cv_data

          # ─────────────────────────────────────────
          # HTML Report Generator
          # ─────────────────────────────────────────
          def generate_html_report(filename, analysis, cv_data):
              keywords_html = ''.join(
                  f'<span class="tag">{k["word"]} <small>{k["count"]}x</small></span>'
                  for k in analysis['keywords']
              )
              readability_color = (
                  '#27ae60' if analysis['readability_score'] >= 70
                  else '#e67e22' if analysis['readability_score'] >= 50
                  else '#e74c3c'
              )
              cv_section = ''
              if cv_data.get('is_cv'):
                  skills_html = ''.join(f'<span class="tag skill">{s}</span>' for s in cv_data.get('skills', []))
                  exp_html    = ''.join(f'<li>{e}</li>' for e in cv_data.get('experience', []))
                  edu_html    = ''.join(f'<li>{e}</li>' for e in cv_data.get('education', []))
                  cv_section  = f"""
                  <div class="section">
                      <h2>👤 CV Profile</h2>
                      <table class="cv-table">
                          {'<tr><td>Name</td><td>' + cv_data['name'] + '</td></tr>' if cv_data.get('name') else ''}
                          {'<tr><td>Email</td><td>' + cv_data['email'] + '</td></tr>' if cv_data.get('email') else ''}
                          {'<tr><td>Phone</td><td>' + cv_data['phone'] + '</td></tr>' if cv_data.get('phone') else ''}
                          {'<tr><td>LinkedIn</td><td>' + cv_data['linkedin'] + '</td></tr>' if cv_data.get('linkedin') else ''}
                          {'<tr><td>GitHub</td><td>' + cv_data['github'] + '</td></tr>' if cv_data.get('github') else ''}
                      </table>
                      {'<h3>Skills</h3><div class="tags">' + skills_html + '</div>' if cv_data.get('skills') else ''}
                      {'<h3>Experience</h3><ul>' + exp_html + '</ul>' if cv_data.get('experience') else ''}
                      {'<h3>Education</h3><ul>' + edu_html + '</ul>' if cv_data.get('education') else ''}
                  </div>"""
              return f"""<!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8"/>
              <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
              <title>Verbiq Report - {filename}</title>
              <style>
                  * {{ margin:0; padding:0; box-sizing:border-box; }}
                  body {{ font-family:Arial,sans-serif; background:#f5f5f5; padding:40px 20px; color:#333; }}
                  .report {{ max-width:800px; margin:0 auto; background:white; border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.1); }}
                  .header {{ background:#1a1a2e; color:white; padding:32px 40px; }}
                  .logo {{ font-size:28px; font-weight:900; letter-spacing:-1px; margin-bottom:6px; }}
                  .logo span {{ color:#e67e22; }}
                  .subtitle {{ font-size:13px; color:#aaa; }}
                  .meta {{ font-size:13px; color:#ccc; margin-top:12px; }}
                  .body {{ padding:32px 40px; }}
                  .section {{ margin-bottom:32px; border-bottom:1px solid #f0f0f0; padding-bottom:24px; }}
                  .section:last-child {{ border-bottom:none; }}
                  .section h2 {{ font-size:16px; color:#1a1a2e; margin-bottom:16px; text-transform:uppercase; letter-spacing:0.5px; }}
                  .section h3 {{ font-size:13px; color:#888; margin:12px 0 8px; text-transform:uppercase; }}
                  .stats-grid {{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; }}
                  .stat {{ background:#f8f9fa; border-radius:8px; padding:16px; border-left:4px solid #e67e22; }}
                  .stat-value {{ font-size:28px; font-weight:bold; color:#1a1a2e; }}
                  .stat-label {{ font-size:11px; color:#888; margin-top:4px; text-transform:uppercase; }}
                  .readability-bar-bg {{ background:#eee; border-radius:10px; height:12px; margin-top:8px; }}
                  .readability-bar {{ height:12px; border-radius:10px; background:{readability_color}; width:{analysis['readability_score']}%; }}
                  .readability-info {{ display:flex; justify-content:space-between; font-size:11px; color:#aaa; margin-top:4px; }}
                  .tags {{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }}
                  .tag {{ background:#fff3e0; color:#e67e22; border:1px solid #e67e22; border-radius:20px; padding:4px 12px; font-size:12px; }}
                  .tag.skill {{ background:#e8f4f8; color:#2980b9; border-color:#2980b9; }}
                  .tag small {{ color:#aaa; margin-left:4px; font-size:10px; }}
                  .summary {{ background:#f8f9fa; border-radius:8px; padding:16px; font-size:14px; line-height:1.8; border-left:4px solid #3498db; color:#444; }}
                  .language-badge {{ display:inline-block; background:#1a1a2e; color:white; border-radius:20px; padding:6px 16px; font-size:14px; font-weight:bold; }}
                  .cv-table {{ width:100%; border-collapse:collapse; margin-top:8px; }}
                  .cv-table td {{ padding:8px 12px; border-bottom:1px solid #f0f0f0; font-size:13px; }}
                  .cv-table td:first-child {{ font-weight:bold; color:#888; width:100px; text-transform:uppercase; font-size:11px; }}
                  ul {{ padding-left:20px; }}
                  ul li {{ font-size:13px; color:#555; margin-bottom:4px; line-height:1.6; }}
                  .footer {{ text-align:center; padding:20px; background:#f8f9fa; font-size:12px; color:#aaa; }}
                  @media print {{ body {{ background:white; padding:0; }} .report {{ box-shadow:none; border-radius:0; }} }}
              </style>
          </head>
          <body>
          <div class="report">
              <div class="header">
                  <div class="logo">Ver<span>biq</span></div>
                  <div class="subtitle">Text Analysis Report</div>
                  <div class="meta">
                      📄 {filename} &nbsp;|&nbsp;
                      📅 {datetime.utcnow().strftime('%d %b %Y %H:%M')} UTC &nbsp;|&nbsp;
                      🌍 {analysis['language']}
                  </div>
              </div>
              <div class="body">
                  <div class="section">
                      <h2>📊 Document Statistics</h2>
                      <div class="stats-grid">
                          <div class="stat"><div class="stat-value">{analysis['word_count']:,}</div><div class="stat-label">Words</div></div>
                          <div class="stat"><div class="stat-value">{analysis['character_count']:,}</div><div class="stat-label">Characters</div></div>
                          <div class="stat"><div class="stat-value">{analysis['unique_words']:,}</div><div class="stat-label">Unique Words</div></div>
                          <div class="stat"><div class="stat-value">{analysis['reading_time']}</div><div class="stat-label">Reading Time</div></div>
                      </div>
                  </div>
                  <div class="section">
                      <h2>🌍 Language</h2>
                      <span class="language-badge">{analysis['language']}</span>
                  </div>
                  <div class="section">
                      <h2>📖 Readability</h2>
                      <div style="display:flex; justify-content:space-between; align-items:center;">
                          <strong style="color:{readability_color}">{analysis['readability_label']}</strong>
                          <span style="font-size:13px; color:#888;">Score: {analysis['readability_score']}/100</span>
                      </div>
                      <div class="readability-bar-bg"><div class="readability-bar"></div></div>
                      <div class="readability-info"><span>Very Difficult</span><span>Very Easy</span></div>
                  </div>
                  <div class="section">
                      <h2>📝 Summary</h2>
                      <div class="summary">{analysis['summary']}</div>
                  </div>
                  <div class="section">
                      <h2>🔑 Top Keywords</h2>
                      <div class="tags">{keywords_html}</div>
                  </div>
                  {cv_section}
              </div>
              <div class="footer">Generated by <strong>Verbiq</strong> - Powered by AWS</div>
          </div>
          </body>
          </html>"""

          # ─────────────────────────────────────────
          # Core Analysis
          # ─────────────────────────────────────────
          def analyze_text(text):
              words       = re.findall(r'\b[a-zA-Z]{2,}\b', text)
              sentences   = [s for s in re.split(r'(?<=[.!?])\s+', text.strip()) if len(s.strip()) > 10]
              paragraphs  = [p for p in text.split('\n\n') if p.strip()]
              syllables   = sum(count_syllables(w) for w in words)
              word_count  = len(words)
              sent_count  = len(sentences)
              readability = calculate_readability(word_count, sent_count, syllables)
              return {
                  'word_count':        word_count,
                  'character_count':   len(text),
                  'unique_words':      len(set(w.lower() for w in words)),
                  'paragraph_count':   len(paragraphs),
                  'reading_time':      f"{math.ceil(word_count / 200)} min read",
                  'language':          detect_language(text),
                  'keywords':          extract_keywords_tfidf(text),
                  'summary':           textrank_summary(text),
                  'readability_score': readability,
                  'readability_label': get_readability_label(readability)
              }

          # ─────────────────────────────────────────
          # Main Handler
          # ─────────────────────────────────────────
          def lambda_handler(event, context):
              print(f"Event: {json.dumps(event)}")
              CORS_HEADERS = get_cors_headers(event)
              path = event.get('resource', event.get('path', ''))

              if event.get('httpMethod') == 'OPTIONS':
                  return {'statusCode': 200, 'headers': CORS_HEADERS, 'body': json.dumps('OK')}

              try:
                  body = json.loads(event['body'])

                  # ── Download route ──
                  if '/download' in path:
                      key = body.get('key')
                      if not key:
                          return {'statusCode': 400, 'headers': CORS_HEADERS, 'body': json.dumps({'error': 'key is required'})}
                      download_url = s3.generate_presigned_url(
                          'get_object',
                          Params={'Bucket': BUCKET_NAME, 'Key': key},
                          ExpiresIn=300
                      )
                      return {'statusCode': 200, 'headers': CORS_HEADERS, 'body': json.dumps({'download_url': download_url})}

                  # ── Upload route ──
                  if '/upload' in path:
                      filename     = body.get('filename')
                      content_type = body.get('contentType', 'application/octet-stream')
                      if not filename:
                          return {'statusCode': 400, 'headers': CORS_HEADERS, 'body': json.dumps({'error': 'filename is required'})}
                      if not any(filename.lower().endswith(ext) for ext in ALLOWED_EXTENSIONS):
                          return {'statusCode': 400, 'headers': CORS_HEADERS, 'body': json.dumps({'error': f'Invalid file type. Allowed: {ALLOWED_EXTENSIONS}'})}
                      presigned_url = s3.generate_presigned_url(
                          'put_object',
                          Params={'Bucket': BUCKET_NAME, 'Key': f'uploads/{filename}', 'ContentType': content_type},
                          ExpiresIn=300
                      )
                      return {'statusCode': 200, 'headers': CORS_HEADERS, 'body': json.dumps({'upload_url': presigned_url, 'filename': filename, 'expires_in': '5 minutes'})}

                  # ── Analyse route ──
                  if '/analyse' in path:
                      filename = body.get('filename')
                      if not filename:
                          return {'statusCode': 400, 'headers': CORS_HEADERS, 'body': json.dumps({'error': 'filename is required'})}

                      local_path = f'/tmp/{filename}'
                      s3.download_file(BUCKET_NAME, f'uploads/{filename}', local_path)

                      text = extract_text(local_path, filename)

                      if not text or len(text.strip()) < 50:
                          ext = filename.lower().split('.')[-1]
                          if ext == 'pdf':
                              msg = 'Could not extract text from this PDF. It may be image-based or scanned. Please try converting to .txt or .docx first.'
                          elif ext == 'docx':
                              msg = 'Could not extract text from this DOCX. Please ensure the file is not corrupted or password protected.'
                          else:
                              msg = 'Could not extract text from this file. Please try a different format.'
                          return {'statusCode': 400, 'headers': CORS_HEADERS, 'body': json.dumps({'error': msg})}

                      print(f"Clean text length: {len(text)} chars")
                      print(f"Text preview: {text[:200]}")

                      analysis = analyze_text(text)
                      cv_data  = parse_cv(text)

                      print(f"Analysis: {analysis['word_count']} words, {analysis['language']}, CV: {cv_data['is_cv']}")

                      # Save JSON
                      json_key = f'results/analysis-{filename}.json'
                      s3.put_object(
                          Bucket=BUCKET_NAME,
                          Key=json_key,
                          Body=json.dumps({**analysis, 'cv_data': cv_data}, indent=2),
                          ContentType='application/json'
                      )

                      # Save HTML report
                      html_key    = f'results/report-{filename}.html'
                      html_report = generate_html_report(filename, analysis, cv_data)
                      s3.put_object(
                          Bucket=BUCKET_NAME,
                          Key=html_key,
                          Body=html_report,
                          ContentType='text/html'
                      )

                      # DynamoDB with TTL
                      ttl_timestamp = int((datetime.now(timezone.utc) + timedelta(days=RESULTS_TTL_DAYS)).timestamp())
                      table = dynamodb.Table(DDB_TABLE_NAME)
                      table.put_item(Item={
                          DDB_PARTITION_KEY:  filename,
                          'WordCount':        analysis['word_count'],
                          'Language':         analysis['language'],
                          'ReadabilityScore': str(analysis['readability_score']),
                          'ReadabilityLabel': analysis['readability_label'],
                          'ReadingTime':      analysis['reading_time'],
                          'IsCV':             str(cv_data['is_cv']),
                          'ProcessedAt':      datetime.utcnow().isoformat(),
                          'ttl':              ttl_timestamp
                      })

                      # SNS notification
                      cv_info = ''
                      if cv_data['is_cv']:
                          cv_info = (
                              f"\n\nCV Detected!"
                              f"\nName: {cv_data.get('name', 'Not found')}"
                              f"\nEmail: {cv_data.get('email', 'Not found')}"
                              f"\nSkills: {', '.join(cv_data.get('skills', [])[:8])}"
                          )
                      sns.publish(
                          TopicArn=SNS_TOPIC_ARN,
                          Message=(
                              f"Verbiq Analysis Complete\n\n"
                              f"File: {filename}\n"
                              f"Words: {analysis['word_count']:,}\n"
                              f"Language: {analysis['language']}\n"
                              f"Readability: {analysis['readability_label']} ({analysis['readability_score']}/100)\n"
                              f"Reading time: {analysis['reading_time']}\n\n"
                              f"Top keywords: {', '.join(k['word'] for k in analysis['keywords'][:5])}\n\n"
                              f"Summary: {analysis['summary'][:300]}"
                              f"{cv_info}"
                          ),
                          Subject='Verbiq - Analysis Complete'
                      )

                      return {
                          'statusCode': 200,
                          'headers': CORS_HEADERS,
                          'body': json.dumps({
                              **analysis,
                              'cv_data':    cv_data,
                              'report_key': html_key,
                              'json_key':   json_key
                          })
                      }

                  return {'statusCode': 404, 'headers': CORS_HEADERS, 'body': json.dumps({'error': 'Route not found'})}

              except ClientError as e:
                  print(f"ClientError: {str(e)}")
                  return {'statusCode': 500, 'headers': CORS_HEADERS, 'body': json.dumps({'error': str(e)})}
              except Exception as e:
                  print(f"Unexpected error: {str(e)}")
                  import traceback
                  traceback.print_exc()
                  return {'statusCode': 500, 'headers': CORS_HEADERS, 'body': json.dumps({'error': str(e)})}

  # ─────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────
  VerbiqApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub ${Environment}-${AWS::Region}-VerbiqApi
      Description: Verbiq API

  UploadResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref VerbiqApi
      ParentId: !GetAtt VerbiqApi.RootResourceId
      PathPart: upload

  AnalyseResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref VerbiqApi
      ParentId: !GetAtt VerbiqApi.RootResourceId
      PathPart: analyse

  DownloadResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref VerbiqApi
      ParentId: !GetAtt VerbiqApi.RootResourceId
      PathPart: download

  # ── Upload Methods ──
  UploadPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref VerbiqApi
      ResourceId: !Ref UploadResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${VerbiqFunction.Arn}/invocations

  UploadOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref VerbiqApi
      ResourceId: !Ref UploadResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: "'*'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: false
            method.response.header.Access-Control-Allow-Headers: false
            method.response.header.Access-Control-Allow-Methods: false

  # ── Analyse Methods ──
  AnalysePostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref VerbiqApi
      ResourceId: !Ref AnalyseResource
      HttpMethod: POST
