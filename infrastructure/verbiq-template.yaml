  # ── Lambda Permissions ──
  UploadPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt VerbiqFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VerbiqApi}/*/POST/upload

  AnalysePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt VerbiqFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VerbiqApi}/*/POST/analyse

