      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VerbiqApi}/*/POST/download

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - UploadPostMethod
      - UploadOptionsMethod
      - AnalysePostMethod
      - AnalyseOptionsMethod
      - DownloadPostMethod
      - DownloadOptionsMethod
    Properties:
      RestApiId: !Ref VerbiqApi
      StageName: !Ref Environment

# ─────────────────────────────────────────
