<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Verbiq - AI Text Analysis</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  display:flex;
  justify-content:center;
  padding:20px 16px;
}

.container{
  width:100%;
  max-width:720px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(12px);
  border-radius:16px;
  padding:26px;
  box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

/* Header */
.header{text-align:center;margin-bottom:14px;}
.logo{font-size:40px;font-weight:900;color:#111;}
.logo span{color:#e67e22;}
.tagline{font-size:13px;color:#6b7280;margin:6px 0 10px;}

.badges{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;}
.badge{background:#f3f4f6;padding:4px 10px;border-radius:20px;font-size:11px;}

/* Demo */
.demo{margin-top:10px;}
.demo img{width:100%;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.1);}

/* Upload */
.upload-area{
  border:2px dashed #d1d5db;
  border-radius:12px;
  padding:26px;
  text-align:center;
  margin:14px 0;
  background:#fafafa;
  transition:.25s;
  position:relative;
}
.upload-area:hover{border-color:#e67e22;background:#fffaf5;transform:translateY(-2px);}
.upload-area.dragover{border-color:#e67e22;background:#fff8f0;}

.upload-icon{font-size:34px;margin-bottom:6px;}
.upload-area h3{font-size:15px;}
.upload-area p{font-size:12px;color:#888;}
.allowed{font-size:11px;color:#e67e22;margin-top:4px;}

#fileInput{
  position:absolute;width:100%;height:100%;
  top:0;left:0;opacity:0;cursor:pointer;
}

/* Buttons */
.btn{
  width:100%;padding:13px;border:none;
  border-radius:10px;font-weight:bold;
  cursor:pointer;margin-top:8px;
}
.btn-primary{
  background:#e67e22;color:white;
  box-shadow:0 6px 16px rgba(230,126,34,0.25);
}
.btn-primary:hover{background:#d35400;}
.btn-primary:disabled{background:#ccc;cursor:not-allowed;}

.btn-secondary{background:#111;color:white;}

/* File */
.file-info{
  display:none;
  background:#f9fafb;
  padding:10px;border-radius:8px;
  font-size:13px;margin-bottom:10px;
}
.file-info.visible{display:block;}

/* Progress */
.progress-container{display:none;margin:10px 0;}
.progress-container.visible{display:block;}
.progress-bar-bg{height:8px;background:#eee;border-radius:10px;}
.progress-bar{height:100%;background:#e67e22;width:0%;border-radius:10px;}

/* Status */
.status{display:none;margin-top:10px;padding:12px;border-radius:8px;font-size:13px;}
.status.visible{display:block;}
.status.success{background:#eafaf1;color:#27ae60;}
.status.error{background:#fdf2f2;color:#e74c3c;}
.status.loading{background:#fff4e5;color:#e67e22;}

/* Results */
.results-panel{display:none;margin-top:18px;}
.results-panel.visible{display:block;}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}
.stat-card{
  background:#f9fafb;
  padding:14px;border-radius:10px;text-align:center;
}
.stat-value{font-size:20px;font-weight:bold;}
.stat-label{font-size:10px;color:#888;}

.footer{text-align:center;font-size:11px;color:#aaa;margin-top:16px;}
</style>
</head>

<body>
<div class="container">

<div class="header">
  <div class="logo">Ver<span>biq</span></div>
  <div class="tagline">Instant AI-powered document analysis</div>

  <div class="badges">
    <span class="badge">📚 Essays</span>
    <span class="badge">📄 CVs</span>
    <span class="badge">✍️ Articles</span>
    <span class="badge">📊 Reports</span>
  </div>

  <!-- 🔥 Put your GIF file in same folder -->
  <div class="demo">
    <img src="verbiq_animated_demo.gif" alt="Demo">
  </div>
</div>

<div class="upload-area" id="dropZone">
  <div class="upload-icon">📂</div>
  <h3>Drop your document</h3>
  <p>or click to browse</p>
  <div class="allowed">.txt .pdf .docx</div>
  <input type="file" id="fileInput" accept=".txt,.pdf,.docx"/>
</div>

<div class="file-info" id="fileInfo"></div>

<div class="progress-container" id="progressContainer">
  <div class="progress-bar-bg">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<button class="btn btn-primary" id="uploadBtn" onclick="uploadAndAnalyse()" disabled>
  Analyse Document
</button>

<div class="status" id="status"></div>

<div class="results-panel" id="resultsPanel">
  <div class="stats-grid" id="statsGrid"></div>
</div>

<div class="footer">
  🔒 Secure processing • Not stored
</div>

</div>

<script>
const UPLOAD_URL="https://6tpmjg4qa4.execute-api.eu-west-3.amazonaws.com/prod/upload";
const ANALYSE_URL="https://6tpmjg4qa4.execute-api.eu-west-3.amazonaws.com/prod/analyse";

let selectedFile=null;

document.getElementById('fileInput').addEventListener('change',e=>{
  selectedFile=e.target.files[0];
  document.getElementById('fileInfo').classList.add('visible');
  document.getElementById('fileInfo').textContent=selectedFile.name;
  document.getElementById('uploadBtn').disabled=false;
});

/* Drag & Drop */
const dropZone=document.getElementById('dropZone');

['dragenter','dragover','dragleave','drop'].forEach(evt=>{
  document.body.addEventListener(evt,e=>{e.preventDefault();});
});

dropZone.addEventListener('drop',e=>{
  selectedFile=e.dataTransfer.files[0];
  document.getElementById('fileInfo').classList.add('visible');
  document.getElementById('fileInfo').textContent=selectedFile.name;
  document.getElementById('uploadBtn').disabled=false;
});

/* MAIN FLOW */
async function uploadAndAnalyse(){
  if(!selectedFile)return;

  showStatus("⏳ Processing...","loading");
  showProgress(20);

  try{
    // Step 1: get upload URL
    const uploadRes=await fetch(UPLOAD_URL,{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({filename:selectedFile.name})
    });

    const uploadData=await uploadRes.json();

    showProgress(50);

    // Step 2: upload file
    await fetch(uploadData.upload_url,{
      method:"PUT",
      body:selectedFile
    });

    showProgress(75);

    // Step 3: analyse
    const analyseRes=await fetch(ANALYSE_URL,{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({filename:selectedFile.name})
    });

    const analysis=await analyseRes.json();

    showProgress(100);
    showStatus("✅ Analysis complete","success");

    renderResults(analysis);

  }catch(err){
    showStatus("❌ Failed: "+err.message,"error");
  }
}

/* Render */
function renderResults(data){
  document.getElementById('resultsPanel').classList.add('visible');

  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-value">${data.word_count}</div><div class="stat-label">Words</div></div>
    <div class="stat-card"><div class="stat-value">${data.character_count}</div><div class="stat-label">Characters</div></div>
    <div class="stat-card"><div class="stat-value">${data.unique_words}</div><div class="stat-label">Unique</div></div>
    <div class="stat-card"><div class="stat-value">${data.reading_time}</div><div class="stat-label">Reading</div></div>
  `;
}

/* UI helpers */
function showStatus(msg,type){
  const el=document.getElementById('status');
  el.innerHTML=msg;
  el.className=`status visible ${type}`;
}

function showProgress(val){
  document.getElementById('progressContainer').classList.add('visible');
  document.getElementById('progressBar').style.width=val+"%";
}
</script>

</body>
</html>
